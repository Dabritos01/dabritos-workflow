# AeroSpace configuration
# Docs: https://nikitabobko.github.io/AeroSpace/guide
# Reload after edits: alt-shift-c  (or `aerospace reload-config`)

# Start AeroSpace at login.
start-at-login = true

# Normalization: keep the tree tidy (i3-like behavior).
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Default layout for new workspaces.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Accordion padding (visual peek when using accordion layout).
accordion-padding = 30

# When focus moves to another monitor, follow with the mouse (helps dock/undock).
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# No gaps.
[gaps]
inner.horizontal = 0
inner.vertical   = 0
outer.left       = 0
outer.right      = 0
outer.top        = 0
outer.bottom     = 0

# ---------------------------------------------------------------------------
# Main mode
# ---------------------------------------------------------------------------
[mode.main.binding]

# Focus (vim-style).
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window within the tree.
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Layout / tree shaping.
alt-slash = 'layout tiles horizontal vertical'      # toggle split orientation
alt-comma = 'layout accordion horizontal vertical'  # toggle accordion
alt-f     = 'fullscreen'                             # zoom focused window
alt-shift-space = 'layout floating tiling'           # toggle float on focused window

# Workspaces (5).
alt-1 = 'workspace 1'  # Ghostty
alt-2 = 'workspace 2'  # Arc
alt-3 = 'workspace 3'  # Teams + Spotify
alt-4 = 'workspace 4'  # Obsidian
alt-5 = 'workspace 5'  # misc
alt-tab = 'workspace-back-and-forth'

# Send focused window to a workspace.
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# Multi-monitor (dock / undock).
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Enter resize mode.
alt-r = 'mode resize'

# Reload config.
alt-shift-c = 'reload-config'

# ---------------------------------------------------------------------------
# Resize mode (i3-style). Enter with alt-r, adjust, exit with esc/enter.
# ---------------------------------------------------------------------------
[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
k = 'resize height -50'
j = 'resize height +50'
enter = 'mode main'
esc   = 'mode main'

# ---------------------------------------------------------------------------
# App -> workspace pinning
# ---------------------------------------------------------------------------
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 4'

# ---------------------------------------------------------------------------
# Float small utility windows that tile badly
# ---------------------------------------------------------------------------
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = 'Copy'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

# ---------------------------------------------------------------------------
# Catch-all: any unpinned app lands on workspace 5 (misc).
# Must stay LAST — AeroSpace runs only the first matching rule.
# ---------------------------------------------------------------------------
[[on-window-detected]]
if = 'true'
run = 'move-node-to-workspace 5'
