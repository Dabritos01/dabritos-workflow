# ============================================= #
# Start with defaults from the Sensible plugin  #
# --------------------------------------------- #
run-shell /nix/store/6iq9z3wnacxqhja3r93b7lsdl1kvcp11-tmuxplugin-sensible-unstable-2017-09-05/share/tmux-plugins/sensible/sensible.tmux
# ============================================= #
 
set  -g default-terminal "screen"
set  -g base-index      0
setw -g pane-base-index 0
 
 
 
set -g status-keys emacs
set -g mode-keys   emacs
 
 
# rebind main key: C-a
unbind C-b
set -g prefix C-a
bind -N "Send the prefix key through to the application" \
  C-a send-prefix
 
 
 
set  -g mouse             on
setw -g aggressive-resize off
setw -g clock-mode-style  24
set  -s escape-time       0
set  -g history-limit     2000
 
# ============================================= #
# Load plugins with Home Manager                #
# --------------------------------------------- #
 
# tmuxplugin-cpu
# ---------------------
 
run-shell /nix/store/s1vg51ss8v1y00843g4wbxk2874jbi1s-tmuxplugin-cpu-unstable-2023-01-06/share/tmux-plugins/cpu/cpu.tmux
 
 
# tmuxplugin-mode-indicator
# ---------------------
 
run-shell /nix/store/6lp2lz0iia9hdhfbcs80gjby8a08w6z2-tmuxplugin-mode-indicator-unstable-2021-10-01/share/tmux-plugins/mode-indicator/mode_indicator.tmux
 
 
# tmuxplugin-nord
# ---------------------
 
run-shell /nix/store/am6x67h9aj9vdssckg09rwgybx3wnp70-tmuxplugin-nord-0.3.0/share/tmux-plugins/nord/nord.tmux
 
 
# tmuxplugin-tmux-fingers
# ---------------------
 
run-shell /nix/store/vqjn5h9ga7gxcyrsi7rgh27afqnig3w5-tmuxplugin-tmux-fingers-2.1.1/share/tmux-plugins/tmux-fingers/load-config.tmux
 
# ============================================= #
 
# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
